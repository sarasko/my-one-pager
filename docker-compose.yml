# Two independent services — run whichever fits what you're doing.
# Dev:  docker compose up dev         → hot-reloading Vite server on :5173
# Prod: docker compose up prod --build → the real nginx production image on :8080

services:
  # Local development without VS Code / Dev Containers — just plain Docker.
  # Bind-mounts your source so edits on the host hot-reload instantly.
  dev:
    image: node:20
    working_dir: /app
    volumes:
      - .:/app
      - node_modules:/app/node_modules # keep container's own node_modules, don't shadow with host's (or its absence)
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"

  # Production image — same Dockerfile used for actual deployment.
  # Lets you sanity-check the built, nginx-served site before shipping it.
  prod:
    build: .
    ports:
      - "8080:80"

volumes:
  node_modules:
